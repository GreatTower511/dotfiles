format = """
  $directory\
  [ ](fg:#6a5acd bg:#ffff00)\
  $git_branch\
  $git_status\
  [ ](fg:#ffff00)\
  $character
"""

right_format = """
$cmd_duration\
$username\
$time
"""

add_newline = true

[username]
style_user = "white bold"
style_root = "black bold"
format = "user: [$user]($style) "
disabled = false

[fill]
symbol = ' '

[directory]
style = "fg:#2E3440 bg:#6a5acd bold"
truncation_length = 10
truncate_to_repo = false
truncation_symbol = "…/"
read_only = ' 󰌾 ' # nf-md-lock
read_only_style = 'fg:#f7768e bg:#1a1b26'
format = '[ $path ]($style)[$read_only]($read_only_style)'


[aws]
disabled = true
[gcloud]
disabled = true

[git_branch]
symbol = ""
style = "bg:#ffff00"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#ffff00)]($style)'

[git_status]
style = "bg:#1d2230"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#ffff00)]($style)'

[cmd_duration]
min_time = 1
style = 'fg:#ffff00'
format = "[$duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
# style = "bg:#1d2230"
format = '[[   $time ](fg:#a0a9cb)]($style)'

[character]
vimcmd_symbol = '[V](bold green) '

